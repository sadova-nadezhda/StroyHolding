<section class="work section-pad section-hidden">
  <div class="container">
    <div class="work__container">
      <h2 class="work__title title-indent">Наши работы</h2>
    </div>
  </div>
  <div class="work__slider">
    <div class="swiper workSwiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide work-slide">
          <img src="@img/work-img-1.png" alt="Внутренняя покраска" />
          <div class="work-slide__badge">Внутренняя покраска</div>
          <a class="work-slide__expand" data-fancybox href="@img/work-img-1.png" aria-label="Открыть фото">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 6V1H6M10 1H15V6M15 10V15H10M6 15H1V10" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
        <div class="swiper-slide work-slide">
          <img src="@img/work-img-2.png" alt="Покраска кровли" />
          <div class="work-slide__badge">Покраска кровли</div>
          <a class="work-slide__expand" data-fancybox href="@img/work-img-2.png" aria-label="Открыть фото">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 6V1H6M10 1H15V6M15 10V15H10M6 15H1V10" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
        <div class="swiper-slide work-slide">
          <img src="@img/work-img-3.png" alt="Фасадные работы" />
          <div class="work-slide__badge">Фасадные работы</div>
          <a class="work-slide__expand" data-fancybox href="@img/work-img-3.png" aria-label="Открыть фото">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 6V1H6M10 1H15V6M15 10V15H10M6 15H1V10" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
