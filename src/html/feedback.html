<section class="feedback section-pad section-hidden">
  <div class="container">
    <div class="feedback__container">
      <div class="feedback__content">
        <h2 class="feedback__title">Подберём материалы или рассчитаем работы под ваш объект</h2>
        <p class="feedback__text">Опишите задачу — менеджер уточнит детали, подберёт подходящие позиции и свяжется с вами.</p>
        <div class="feedback__form">
          <form>
            <div class="feedback__form-group">
              <label for="feedback-name">ФИО*</label>
              <input type="text" class="feedback__input" id="feedback-name" placeholder="Ваше имя" required />
            </div>
            <div class="feedback__form-group">
              <label for="feedback-phone">Телефон*</label>
              <input type="tel" class="feedback__input" id="feedback-phone" placeholder="+7 (___) ___ __ __" required />
            </div>
            <div class="feedback__form-group">
              <label for="feedback-message">Что нужно подобрать или рассчитать?*</label>
              <textarea class="feedback__input feedback__textarea" id="feedback-message" placeholder="Например: ЖБИ для объекта, краска для фасада, покраска помещения, гидроизоляция" required></textarea> 
            </div>
            <div class="feedback__form-bottom">
              <button type="submit" class="feedback__submit button button-primary">Получить подбор</button>
              <span class="feedback__description">Свяжемся с вами и подберём подходящие варианты под ваш запрос.</span>
            </div>
          </form>
        </div>
      </div>
      <div class="feedback__img">
        <img src="@img/feedback-img.png" alt="Свяжитесь с нами" />
      </div>
    </div>
  </div>
</section>
