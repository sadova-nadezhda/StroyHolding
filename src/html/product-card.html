<div class="product-card@@if (typeof status !== 'undefined' && status === 'out-of-stock'){ product-card--out-of-stock}@@if (typeof status !== 'undefined' && status === 'coming-soon'){ product-card--coming-soon}" data-category="@@category" data-subcategory="@@subcategory">
  <a class="product-card__top" href="product.html">
    <div class="product-card__badges">
      <span class="product-card__badge product-card__badge-discount">-10%</span>
      <span class="product-card__badge">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 0L7.62054 4.37946L12 6L7.62054 7.62054L6 12L4.37946 7.62054L0 6L4.37946 4.37946L6 0Z" fill="white"/>
        </svg>
        Популярное
      </span>
    </div>
    <img src="@img/product-card-img.png" alt="" />
  </a>

  <div class="product-card__content">
    <div class="product-card__group">
      <h3 class="product-card__title text-up"><a href="product.html">Betek fibrious aquaset</a></h3>
      <p class="product-card__description">Обмазочная гидроизоляция</p>
      <ul class="product-card__volume">
        <li>1 кг</li>
        <li>Розница</li>
      </ul>
    </div>
    @@if (typeof status !== 'undefined' && status === 'out-of-stock') {
    <button class="product-card__button button button-light" type="button" disabled>Нет в наличии</button>
    }
    @@if (typeof status !== 'undefined' && status === 'coming-soon') {
    <button class="product-card__button product-card__button--soon" type="button" disabled>Скоро в наличии</button>
    }
    @@if (typeof status === 'undefined' || status === '') {
